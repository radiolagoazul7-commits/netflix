<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Cadastro - NetFlix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #e50914;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .auth-header i {
            font-size: 36px;
        }

        .auth-header p {
            color: #b3b3b3;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #b3b3b3;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .auth-tab.active {
            color: #ffffff;
            background: rgba(229, 9, 20, 0.1);
            border-bottom-color: #e50914;
        }

        .auth-tab:hover {
            color: #ffffff;
        }

        .auth-form {
            display: none;
            animation: slideIn 0.3s ease;
        }

        .auth-form.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 11px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 5px;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #e50914;
            box-shadow: 0 0 8px rgba(229, 9, 20, 0.3);
        }

        input::placeholder {
            color: #6b6b6b;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background: #c40812;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(255, 107, 107, 0.15);
            color: #ff9999;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .message.success {
            display: block;
            background: rgba(81, 207, 102, 0.15);
            color: #99ff99;
            border: 1px solid rgba(81, 207, 102, 0.3);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
            font-size: 13px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
        }

        .guest-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .guest-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .footer-text {
            text-align: center;
            color: #6b6b6b;
            font-size: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 480px) {
            .auth-container {
                max-width: 100%;
            }

            .auth-header h1 {
                font-size: 24px;
            }

            input {
                padding: 10px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1><i class="fas fa-play"></i> NetFlix</h1>
            <p>Faça login ou crie sua conta para começar</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="signup">Cadastro</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
            <div id="loginMessage" class="message"></div>
            
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="loginPassword">Senha</label>
                <input type="password" id="loginPassword" required placeholder="Digite sua senha">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Manter-me conectado</label>
            </div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>

            <button type="button" class="guest-btn" id="guestBtn">
                <i class="fas fa-user-secret"></i> Acessar como Visitante
            </button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form">
            <div id="signupMessage" class="message"></div>
            
            <div class="form-group">
                <label for="signupName">Nome Completo</label>
                <input type="text" id="signupName" required placeholder="Seu nome">
            </div>

            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" required placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="signupPassword">Senha</label>
                <input type="password" id="signupPassword" required placeholder="Mínimo 6 caracteres">
            </div>

            <div class="form-group">
                <label for="signupPasswordConfirm">Confirmar Senha</label>
                <input type="password" id="signupPasswordConfirm" required placeholder="Confirme sua senha">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">Concordo com os Termos de Serviço</label>
            </div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-user-plus"></i> Criar Conta
            </button>

            <button type="button" class="guest-btn" id="guestBtnSignup">
                <i class="fas fa-user-secret"></i> Acessar como Visitante
            </button>
        </form>

        <div class="footer-text">
            Protegido por encriptação HTTPS
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
